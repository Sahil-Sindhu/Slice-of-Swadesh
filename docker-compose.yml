version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: swadesh-db
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    networks:
      - swadesh-network

  redis:
    image: redis:7.0-alpine
    container_name: swadesh-cache
    ports:
      - '6379:6379'
    networks:
      - swadesh-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: swadesh-api
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/swadesh
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongodb
      - redis
    networks:
      - swadesh-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: swadesh-ui
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api/v1
    depends_on:
      - backend
    networks:
      - swadesh-network

  nginx:
    image: nginx:alpine
    container_name: swadesh-proxy
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - swadesh-network

volumes:
  mongodb_data:

networks:
  swadesh-network:
    driver: bridge
