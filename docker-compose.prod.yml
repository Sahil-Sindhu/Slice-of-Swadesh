version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: slice_of_swadesh_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - slice_network

  redis:
    image: redis:7-alpine
    container_name: slice_of_swadesh_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - slice_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: slice_of_swadesh_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/slice-of-swadesh
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis
    networks:
      - slice_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: slice_of_swadesh_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - slice_network

networks:
  slice_network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
